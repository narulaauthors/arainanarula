<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Araina Narula – Art Journey</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(to bottom, #fff5fa, #f2e6ee);
  color: #9c5a73;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  font-family: 'Poppins';
  color: #c85f83;
}

.section-card {
  background: #fdeff4;
  border-radius: 20px;
  padding: 30px;
  margin-top: 30px;
}

.section-strip {
  text-align: center;
  font-family: 'Poppins';
  color: #cf6b8d;
  font-size: 1.3rem;
  margin-bottom: 25px;
}

/* ⭐ FIXED GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

/* ⭐ UNIFORM CARD */
.art-item {
  position: relative;
  width: 100%;
  height: 260px;   /* MASTER CONTROL */
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ⭐ IMAGE FITS INSIDE CARD */
.art-item img.main-art {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 12px;
  display: block;
  cursor: pointer;
}

/* ⭐ SIGNATURE ALWAYS CORRECT */
.signature {
  position: absolute;
  bottom: 8px;
  right: 10px;
  width: 40px;
  pointer-events: none;
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Araina Narula – Art Journey</h1>

<div class="section-card">
<div class="section-strip">Grade 4 (2025)</div>

<div class="gallery">

<div class="art-item">
<img class="main-art" src="artimages/art_2025_1.jpg" onclick="openLightbox(this.src)">
<img class="signature" src="artimages/signature.png">
</div>

<div class="art-item">
<img class="main-art" src="artimages/art_2025_2.jpg" onclick="openLightbox(this.src)">
<img class="signature" src="artimages/signature.png">
</div>

<div class="art-item">
<img class="main-art" src="artimages/art_2025_3.jpg" onclick="openLightbox(this.src)">
<img class="signature" src="artimages/signature.png">
</div>

<div class="art-item">
<img class="main-art" src="artimages/art_2025_4.jpg" onclick="openLightbox(this.src)">
<img class="signature" src="artimages/signature.png">
</div>

<div class="art-item">
<img class="main-art" src="artimages/art_2025_5.jpg" onclick="openLightbox(this.src)">
<img class="signature" src="artimages/signature.png">
</div>

<div class="art-item">
<img class="main-art" src="artimages/art_2025_6.jpg" onclick="openLightbox(this.src)">
<img class="signature" src="artimages/signature.png">
</div>

</div>
</div>

</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
<img id="lightbox-img">
</div>

<script>
function openLightbox(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src=src;
}
function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
