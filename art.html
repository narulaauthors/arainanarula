<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Araina Art</title>

<style>
body {
  font-family: Arial;
  background: #f6eef1;
  text-align: center;
}

h2 {
  color: #c06c84;
}

/* GALLERY */
.art-gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px;
  justify-items: center;
  max-width: 1000px;
  margin: auto;
}

/* COMMON BOX */
.art-item {
  position: relative;
  border-radius: 16px;
}

/* HORIZONTAL BOX */
.art-horizontal {
  width: 320px;
  height: 220px;
}

/* VERTICAL BOX */
.art-vertical {
  width: 240px;
  height: 320px;
}

/* IMAGE FIT */
.art-item img.main-art {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* SIGNATURE */
.art-item img.signature {
  position: absolute;
  bottom: 2px;
  right: 6px;
  width: 55px;
  opacity: 0.9;
}
  ..art-title {
  margin-top: 12px;
  font-size: 16px;
  color: #5a3e4d;
  font-style: italic;
  text-align: center;
    letter-spacing: 0.3px;
}
</style>

</head>

<body>

<h2>Grade 4 (2025)</h2>

<div class="art-gallery">

  <div class="art-item art-horizontal">
    <img src="artimages/art_2025_1.jpg" class="main-art">
    <img src="artimages/signature.png" class="signature">
    <p class="art-title">Flying High</p>
  </div>

  <div class="art-item art-horizontal">
    <img src="artimages/art_2025_2.jpg" class="main-art">
    <img src="artimages/signature.png" class="signature">
        <p class="art-title">Beautiful water life</p>
</div>

  <div class="art-item art-horizontal">
    <img src="artimages/art_2025_3.jpg" class="main-art">
    <img src="artimages/signature.png" class="signature">
            <p class="art-title">Picnic with friends</p>
</div>

  <div class="art-item art-vertical">
    <img src="artimages/art_2025_4.jpg" class="main-art">
    <img src="artimages/signature.png" class="signature">
    <p class="art-title">Harmony in jungle</p>
  </div>

  <div class="art-item art-vertical">
    <img src="artimages/art_2025_5.jpg" class="main-art">
    <img src="artimages/signature.png" class="signature">
    <p class="art-title">Family love</p>
  </div>

  <div class="art-item art-vertical">
    <img src="artimages/art_2025_6.jpg" class="main-art">
    <img src="artimages/signature.png" class="signature">
        <p class="art-title">Alien world</p>
</div>

</div>

</body>
</html>
